<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pinly</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FCECDA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #185538;
    }
    .loading {
      text-align: center;
    }
    .loading h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .loading p {
      opacity: 0.6;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="loading">
    <h1>Pinly</h1>
    <p>Loading your map…</p>
  </div>
</body>
</html>
